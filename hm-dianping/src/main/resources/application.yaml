server:
  port: 8081
spring:
  rabbitmq:
    host: 192.168.74.128
    port: 5672
    virtual-host: /kanodays
    username: kanodays88
    password: zhangboji88
    listener:
      simple:
        prefetch: 1 #设置每个消费者每次只能获取一个消息，处理完后才能获取下一个，不设置这个当多个消费者共用一个消息队列时，会负载均衡，如果有个别消费者性能差会拖慢整体节奏
  profiles:
    active: server1
  main:
    allow-circular-references: true
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.74.128:3306/hmdp?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
    username: root
    password: zhangboji88
  redis:
    host: 192.168.74.128
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 2
  cache:
    type: redis     # 指定缓存类型为 Redis
    redis:
      time-to-live: 3600000 # 缓存过期时间（1小时，单位毫秒）
#      key-prefix: "cache:"  # 缓存键前缀（避免和其他 Redis 数据冲突）
      use-key-prefix: true  # 启用前缀
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug